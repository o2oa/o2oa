<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <link rel="stylesheet" type="text/css" href="css/style.css" charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="css/v10/root.css" charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="css/v10/style.css" id="oo-css-skin" charset="UTF-8" />
        <link rel="stylesheet" href="css/mBoxNotice.css" charset="UTF-8" />
        <link rel="stylesheet" href="css/mBoxTooltip.css" charset="UTF-8" />
        <link rel="icon" href="data:;" />

        <title></title>

        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport" />
        <meta content="yes" name="apple-mobile-web-app-capable" />
        <meta content="black" name="apple-mobile-web-app-status-bar-style" />
        <meta content="telephone=no" name="format-detection" />
    </head>
    <body style="overflow: auto; margin: 0px; height: 100%">
        <div id="appContent" class="appContent" style="overflow: hidden; height: 100%">
            <div
                id="loaddingArea"
                style="overflow: hidden; width: 0px; height: 2px; background-color: #4e82bd; position: absolute; top: 0; z-index: 10000"
            ></div>
        </div>

        <script src="../o2_core/o2.js"></script>
        <script src="../o2_lib/Decimal.js"></script>
        <script src="js/base_portal.js"></script>
        <script>
            layout.addReady(function(){
                (function(layout){
                    var uri = new URI(window.location.href);
                    var appNames = "portal.Portal";
                    var options = {"portalId": "index"};

                    var _load = function(){
                        layout.apps = [];
                        layout.node = $("layout") || $("appContent") || document.body;
      
                        layout.openApplication(null, appNames, options);

                        if (!layout.session.user || layout.session.user.name === "anonymous"){
                            o2.loadCss("../o2_core/o2/xDesktop/$Default/blue/style-skin.css");
                        }else{
                            o2.xDesktop.getUserLayout(function(){
                                var style = layout.userLayout.flatStyle;
                                o2.loadCss("../o2_core/o2/xDesktop/$Default/"+style+"/style-skin.css");
                            });
                        }
                    };

                    Promise.resolve(layout.sessionPromise || '').then(function(json){
                        _load();
                    });
                })(layout);
            });
        </script>
    </body>
</html>
