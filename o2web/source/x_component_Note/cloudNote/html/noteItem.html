<div class="note_list_item">
    <div class="note_list_item_content">
        <div class="note_list_item_title">
            <i class="note_list_item_title_icon icon icon_{{$.noteType}}"></i>
            <div class="note_list_item_tool">
                <i class="note_list_item_tool_icon icon icon_top_select"></i>
                <i class="note_list_item_tool_icon icon icon_menu_share"></i>
                <i class="note_list_item_tool_icon icon icon_menu_recycle"></i>
                <i class="note_list_item_tool_icon icon icon_menu_star"></i>
                <i class="note_list_item_tool_icon icon icon_star_selected"></i>
            </div>
            <span>{{$.subject}}</span>
        </div>
        <div class="note_list_item_summary">{{$.summary}}</div>
        <div>
            <div class="note_list_item_date">{{$.createTime}}</div>
            <div class="note_list_item_category">{{$.categoryName}}</div>
        </div>
    </div>
</div>
