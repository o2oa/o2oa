
    <div class="tw-tasks-base-item">
        <div class="tw-tasks-base-item-title">任务名称</div>
        <div class="tw-tasks-base-item-value">
            <div>
                <input type="text" data-o2-element="tasksName" readonly="readonly" />
            </div>
            <div class="tw-tasks-base-item-value-icon"></div>
        </div>
    </div>
    <div class="tw-tasks-base-item">
        <div class="tw-tasks-base-item-title">状态</div>
        <div class="tw-tasks-base-item-value">
            <div data-o2-element="tasksStatus"></div>
            <div class="tw-tasks-base-item-value-icon o2-tw-jiantou-xia"></div>
        </div>
    </div>
    <div class="tw-tasks-base-item">
        <div class="tw-tasks-base-item-title">负责人</div>
        <div class="tw-tasks-base-item-value">
            <div data-o2-element="tasksDuty"></div>
            <div class="tw-tasks-base-item-value-icon o2-tw-user-plus"  style="color:#4A90E2;font-size:18px;"></div>
        </div>
    </div>
    <div class="tw-tasks-base-item" style="height:auto;">
        <div class="tw-tasks-base-item-title">参与者</div>
        <div class="tw-tasks-base-item-value">
            <div data-o2-element="participant" style="flex-wrap: wrap;"></div>
            <div class="tw-tasks-base-item-value-icon o2-tw-user-plus" style="color:#4A90E2;font-size:18px;"></div>
        </div>
    </div>
    <div class="tw-tasks-base-item">
        <div class="tw-tasks-base-item-title">时间</div>
        <div class="tw-tasks-base-item-value">
            <div class="tw-tasks-base-item-time">
                <input type="text" placeholder="开始时间" readonly="readonly" data-o2-element="tasksStartTime" />
                 - 
                <input type="text" placeholder="结束时间" readonly="readonly" data-o2-element="tasksEndTime" />
            </div>
            <div class="tw-tasks-base-item-value-icon o2-tw-riqi" style="font-size:20px;"></div>
        </div>
    </div>
    <div class="tw-tasks-base-item">
        <div class="tw-tasks-base-item-title">项目来源</div>
        <div class="tw-tasks-base-item-value">
            <div><input type="text" placeholder="请填写项目来源" data-o2-element="tasksSource" readonly="readonly" /></div>
            <div class="tw-tasks-base-item-value-icon"></div>
        </div>
    </div>
    <div class="tw-tasks-base-item-mult">
        <div class="tw-tasks-base-item-title-mult">任务说明</div>
        <div class="tw-tasks-base-item-value-mult">
            <textarea data-o2-element="tasksDescription" placeholder="填写任务说明" readonly="readonly"></textarea>
        </div>
    </div>
    <div class="tw-tasks-base-item-mult">
        <div class="tw-tasks-base-item-title-mult">工作进展</div>
        <div class="tw-tasks-base-item-value-mult">
            <div><textarea data-o2-element="tasksDetail" placeholder="填写工作进展" readonly="readonly"></textarea></div>
        </div>
    </div>
    <div class="tw-tasks-base-item">
        <div class="tw-tasks-base-item-title">重要程度</div>
        <div class="tw-tasks-base-item-value">
            <div data-o2-element="tasksImportant">
                <div class="tw-tasks-base-item-yuan" data-status="高">
                    <div class="o2-tw-yuan"></div><div>高</div>
                </div>
                <div class="tw-tasks-base-item-yuan" data-status="低">
                    <div class="o2-tw-yuan"></div><div>低</div>
                </div>
            </div>
        </div>
    </div>
    <div class="tw-tasks-base-item">
        <div class="tw-tasks-base-item-title">紧急程度</div>
        <div class="tw-tasks-base-item-value">
            <div data-o2-element="tasksUrgency">
                <div class="tw-tasks-base-item-yuan" data-status="高">
                    <div class="o2-tw-yuan"></div><div>高</div>
                </div>
                <div class="tw-tasks-base-item-yuan" data-status="低">
                    <div class="o2-tw-yuan"></div><div>低</div>
                </div>
            </div>
        </div>
    </div>
    <div class="tw-tasks-base-item">
        <div class="tw-tasks-base-item-title">工作进度</div>
        <div class="tw-tasks-base-item-value">
            <div data-o2-element="tasksProgress" class="tw-tasks-base-item-progress">
                
            </div>
        </div>
    </div>

    <div class="tw-tasks-base-sep"></div>
    
    <div class="tw-tasks-base-attachment" data-o2-element="tasksAttachment">

    </div>
