<div class="stat_filter_content">
    <div>
        <div class="stat_filter_item">
            <div class="stat_filter_item_title">{{$.lp.filterDate}}</div>
            <div class="stat_filter_item_value">
                <span class="stat_filter_item_date" data-o2-element="startTime"></span>
                - 
                <span class="stat_filter_item_date" data-o2-element="endTime"></span>
            </div>
        </div>
        
        <div class="stat_filter_item">
            <div class="stat_filter_item_button" data-o2-events="click:stat;">{{$.lp.stat}}</div>
            <!-- <div class="stat_filter_item_button" data-o2-element="click:reset;">{{$.lp.reset}}</div> -->
        </div>
    </div>
    <div>
        <div class="stat_filter_item">
            <div class="stat_filter_item_title">{{$.lp.project}}<span style="font-size:12px;">(可选)</span></div>
            <div class="stat_filter_item_value">
                <div class="stat_filter_item_project" data-o2-element="filterProject"></div>
                <div class="stat_filter_item_project_select" data-o2-events="click:selectProject;">{{$.lp.select}}</div>
            </div>
        </div>
    </div>
</div>
<div class="stat_table_content">
    <table class="stat_table">
        <tr>
            <th>{{$.lp.taskTotal}}</th>
            <th>{{$.lp.taskCompleted}}</th>
            <th>{{$.lp.taskCompleted_overtime}}</th>
            <th>{{$.lp.taskFlow}}</th>
            <th>{{$.lp.taskDelay}}</th>
            <th>{{$.lp.taskCanceled}}</th>
            <th>{{$.lp.closeRate}}</th>
            <th>{{$.lp.closeOKRate}}</th>
            <th>{{$.lp.overtimeRate}}</th>
        </tr>
        <tr>
            <td data-o2-element="taskTotal">-</td>
            <td data-o2-element="taskCompleted">-</td>
            <td data-o2-element="taskCompleted_overtime">-</td>
            <td data-o2-element="taskFlow">-</td>
            <td data-o2-element="taskDelay">-</td>
            <td data-o2-element="taskCanceled">-</td>
            <td data-o2-element="closeRate">-</td>
            <td data-o2-element="closeOKRate">-</td>
            <td data-o2-element="overtimeRate">-</td>
        </tr>
    </table>
</div>
<div class="stat_chat_content" data-o2-element="statChatContent">
    
</div>
