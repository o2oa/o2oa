<div class="laneLayout">
    <div class="lane">
        <div class="laneTitle">
            <div><span>执行中</span><span class="laneCount">(0)</span></div>
            <div><img src="../x_component_TeamWork/$TaskLane/default/icon/icon_reload.png" data-o2-events="click:loadLane:processing" /></div>
        </div>
        <div class="laneContent" id="processingLane">

        </div>
    </div>
    <div class="lane">
        <div class="laneTitle">
            <div><span>已完成</span><span>(0)</span></div>
            <div><img src="../x_component_TeamWork/$TaskLane/default/icon/icon_reload.png" data-o2-events="click:loadLane:completed" /></div>
        </div>
        <div class="laneContent" id="completedLane">

        </div>
    </div>
</div>
