<div class="layoutNavi">
    <div class="naviSearchContainer">
        <input data-o2-element="taskSearch" value = "" placeholder="任务搜索"  data-o2-events="" />
    </div>
    <div class="naviTaskContainer">
        <div class="naviTaskItemTitle">
            <div>任务</div><img src="../x_component_TeamWork/$Project/default/icon/icon_jia.png" />
        </div>
        <div class="naviTaskItem" data-o2-element="naviTaskQuadrant">
            <div>四象限</div>
        </div>
        {{each $.data.groups}}
        <div class="naviGroupItem" id="{{$.id}}">
            <div class="naviGroupText"><span>{{$.name}}</span><span class="naviGroupCount"></span></div>
            <div class="naviGrouplineContainer">
                <div class="naviGroupLine"></div>
            </div>
        </div>
        {{end each}}
    </div>
    <div class="naviViewContainer">
        <div class="naviViewItemTitle">
            <div>视图</div>
        </div>
        {{each $.data.views}}
        <div class="naviViewItem">
            <div>{{$.name}}</div>
        </div>
        {{end each}}

    </div>
</div>
<div class="layoutFolder">
    
</div>
<div class="layoutContent">
    
</div>
