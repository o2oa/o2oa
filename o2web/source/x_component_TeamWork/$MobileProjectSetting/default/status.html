<div class="tw-ps-status-item" data-o2-element="statusProcessing"  data-o2-events="click:setStatus:processing;">
    <div class="tw-ps-status-item-title">
        <div class="o2-tw-jinxing"></div>
        <div>进行中</div>
    </div>
    <div class="tw-ps-status-item-dagou {{(function(){
        var res = "";
        if($.data.workStatus == "processing") res = "o2-tw-dagou"
        return res
    })()}}"></div>
</div>
