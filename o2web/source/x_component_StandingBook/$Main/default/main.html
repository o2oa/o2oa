<div class="appNode" data-o2-element="appNode">
    <div class="menuArea" data-o2-element="menuArea">
        <div class="menu">
            <div class="menuTitle">
                <div class="menuTitleLogo" style="background-image: url('../x_component_StandingBook/$Main/default/icons/appicon.png');"></div>
                <div class="menuTitleText">{{$.lp.title}}</div>
                <div class="menuHelp" data-o2-events="click:introduce"></div>
            </div>

            <div class="menuSearchArea">
                <i class="menuSearchButton o2icon-search1 mainColor_color" data-o2-events="click:searchApp;mouseover:iconOver_searchButton;mouseout:iconOut_searchButton"></i>
                <input class="menuSearchInput" data-o2-element="searchAppInput" placeholder="{{$.lp.searchAppPlacholder}}" data-o2-events="keydown:menuSearchKeydown"/>
            </div>

            <div class="menuContent" data-o2-element="menuContent">
            </div>

            <div class="menuBottom" data-o2-element="configContent" data-o2-events="click:openConfigView;">
                <i class="o2icon-config menuBottomIcon"></i>
                <div class="menuTitleText">{{$.lp.setting}}</div>
            </div>


        </div>
    </div>
    <div class="contentArea">
        <div class="content" data-o2-element="contentArea">
        </div>
    </div>
</div>
