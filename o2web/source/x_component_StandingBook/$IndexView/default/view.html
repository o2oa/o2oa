<div class="index-wrap" data-o2-element="contentNode">
    <div class="index-search-wrap">
        <div class="index-top" data-o2-element="topNode">
            <div class="index-top-inner mainColor_border">
                <div style="overflow: hidden;margin-bottom: 5px;">
                    <div class="breadcrumb-index">
                        <span class="mainColor_color" style="overflow: hidden;" title="{{$.appData.name}}">{{$.appData.name}}</span>
                    </div>

<!--                    <div data-o2-element="docTotalNode" class="docTotalNode" ></div>-->
                    <div class="export-action mainColor_bg" data-o2-events="click:exportExcel">
                        <span>{{this.lp.export}}</span>
                    </div>
                </div>

                <div data-o2-element="filterArea"></div>
            </div>
        </div>
        <div data-o2-element="docContent" class="docContent-index">
            <div class="contentWrap-index">
<!--                <div data-o2-element="conditionSelectedArea"></div>-->
<!--                <div data-o2-element="conditionArea"></div>-->
                <div class="index-listNode" data-o2-element="docListNode">
<!--                    <div class="loadingNode">-->
<!--                        <div class="loadingNodeIcon"></div>-->
<!--                        <div class="loadingNodeText">{{$.lp.loadingData}}</div>-->
<!--                    </div>-->
                </div>
            </div>
        </div>
        <div class="index-pagingNode mainColor_border" data-o2-element="docPaginationNode"></div>
    </div>
</div>
