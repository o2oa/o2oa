<div data-o2-element="configArea" style="height: 100%">
    <div class="menuArea" data-o2-element="menuArea">
        <div class="menu">
            <div class="menuTitleConfig">
                <div class="menuTitleLogo" style="background-image: url('../x_component_StandingBook/$Main/default/icons/config.png');"></div>
                <div class="menuTitleTextConfig">{{$.lp.config}}</div>
                <i class="o2icon-add menuTitleAction mainColor_color" data-o2-events="click:createConfigItem;"></i>
            </div>

            <div class="menuContent" data-o2-element="menuContent">
            </div>

            <div class="menuBottom" data-o2-events="click:returnIndex;">
                <i class="o2icon-list4 menuBottomIcon"></i>
                <div class="menuTitleText">{{$.lp.title}}</div>
            </div>

        </div>
    </div>
    <div class="contentArea">
        <div class="content" data-o2-element="contentArea">
        </div>
    </div>
</div>
