<div class="chat-top">
    <div class="chat-ai-type" data-o2-events="click:showAiType;">
        <div data-o2-element="currentAiNode" >{{$.aiType}}</div>
        <div class="ooicon-drop_down"></div>
    </div>
    <div class="chat-top-title" data-o2-element="titleNode">{{$.lp.newChat}}</div>
</div>
<div class="index">
    <div class="chat">
        <div class="chat-title">
            <div><img src="{{$.config.appIconUrl}}"></div>
            <div>{{$.config.title}}</div>
        </div>
        <div class="chat-desc">{{$.config.desc}}</div>
        <div class="chat-hot {{if !$.config.o2AiEnable}} hide {{end if}}">
            <div class="chat-hot-l">
                <img src="../x_component_AI/$Main/default/images/bg_o2.png">
            </div>
            <div class="chat-hot-r">

                {{each $.mcpList}}
                <div class="chat-hot-item" data-o2-events="click:quickChat:{{$.extra.indexPrompt}};">
                    <div class="chat-hot-item-title">
                        <i class="ooicon-{{$.extra.icon}}"></i>
                        <span>{{$.displayName}}</span>
                    </div>
                    <div class="chat-hot-item-desc">{{$.extra.indexDesc}}
                    </div>
                </div>
                {{end each}}


            </div>
        </div>
        <div class="chat-wrap">
            <div class="chat-att" data-o2-element="attUplodListNode">
            </div>
            <div class="chat-input"><textarea placeholder="{{$.lp.inputholder}}" data-o2-element="chatNode"></textarea>
            </div>
            <div class="chat-tools" >
                <div class="chat-tools-l" >
                    <div data-o2-events="click:showGenerateType" data-o2-element="tool1Node" class="chat-tools-cur ooicon-networking_click"></div>
                    <div data-o2-events="click:showGenerateType" data-o2-element="tool2Node" class="chat-tools-cur" style="cursor: pointer;">{{$.lp.types.auto}}</div>
                    <div>｜</div>
                    <div data-o2-element="tool3Node">{{$.lp.types.auto_text}}</div>

                    <div class="chat-think hide" data-o2-events="click:setThinking" data-o2-element="thinkingNode">
                        <div class="ooicon-clock "></div><div>深度思考</div>
                    </div>
                </div>

                <div class="ooicon-fujian chat-tools-icon"
                     data-o2-events="click:addAtt" data-o2-element="addAttNode" title="本地上传"></div>
                <div class="ooicon-files chat-tools-icon"
                     data-o2-events="click:addAtt:drive" data-o2-element="addDriveNode" title="从网盘中选择"></div>


                <div data-o2-element="btnSendNode" data-o2-events="click:sendNew">
                    <div class="btn">
                        <i class="ooicon-send1"></i>
                    </div>
                </div>
                <div data-o2-element="btnCancelNode" data-o2-events="click:stop" style="display: none">
                    <div class="btn" style="color: #fff;background: #2E82F7;">
                        <i class="ooicon-stop1"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
