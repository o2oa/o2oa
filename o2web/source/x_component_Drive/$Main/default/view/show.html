<div class="o2_drive_detail_content">
    <div class="thumb" style="width: 310px; height: 206px; border-radius: 5px;"><img
            src="https://staticwx.cdn.bcebos.com/mini-program/images/ic_panDoc_v2.png"
            style="width: 100%; height: 100%; object-fit: contain;"></div>
    <div class="contentNode">
        <div class="item">
            <div class="title"><img src="https://staticwx.cdn.bcebos.com/mini-program/images/ic_txt_v2.png"><span>{{$.data.name}}</span>
            </div>
        </div>
        <div class="subitem">
            <div class="title">创建时间：</div>
            <div class="con">{{$.data.createTime}}</div>
        </div>
        <div class="subitem">
            <div class="title">修改时间：</div>
            <div class="con">{{$.data.updateTime}}</div>
        </div>
        <div class="subitem">
            <div class="title">文件格式：</div>
            <div class="con">{{$.data.extension}}</div>
        </div>
        <div class="subitem">
            <div class="title">所在目录：</div>
            <div class="con">根目录</div>
        </div>
    </div>
</div>
